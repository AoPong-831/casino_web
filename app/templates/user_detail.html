<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.name }} の詳細情報</title>
</head>
<body>
    <h1>{{ user.name }} の詳細情報</h1>
    <p><strong>名前:</strong> {{ user.name }}</p>
    <p><strong>パスワード:</strong> {{ user.password }}</p>
    <a href="{{ url_for('edit_user', id=user.id) }}">編集</a>
    <form action="{{ url_for('delete_user', id=user.id) }}" method="POST" style="display:inline;">
        <button type="submit">削除</button>
    </form>
    <br><br>
    <a href="{{ url_for('users') }}">ユーザー一覧に戻る</a>
</body>
</html>
